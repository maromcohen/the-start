<style>
.cd .pour-sec{position:relative;min-height:80vh;display:grid;place-items:center;background:radial-gradient(135% 100% at 50% 34%,#1a1316,#0b0809 48%,#000);overflow:hidden}

.cd .gframe{position:relative;width:min(44vh,72vw);max-width:380px;aspect-ratio:9/16;border-radius:24px;overflow:hidden;border:1px solid rgba(255,255,255,.14);background:#000;box-shadow:0 60px 140px -45px rgba(244,169,184,.5)}
