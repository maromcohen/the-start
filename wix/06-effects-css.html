<style>
.cd-loader{position:fixed;inset:0;z-index:10000;background:#0a0708;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease,visibility .8s}
.cd-loader.out{opacity:0;visibility:hidden}
.cd-loader .ll{width:80px;height:80px;border-radius:50%;overflow:hidden;margin-bottom:24px;animation:lpulse 1.6s ease-in-out infinite;border:2px solid rgba(217,179,130,.3)}
.cd-loader .ll img{width:100%;height:100%;object-fit:cover;filter:invert(1)}
@keyframes lpulse{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(200,77,99,.4)}50%{transform:scale(1.08);box-shadow:0 0 30px 10px rgba(200,77,99,0)}}
.cd-loader .lbar{width:180px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.cd-loader .lbar span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--rose),var(--blush),var(--gold));border-radius:2px;animation:lload 2s ease forwards}
@keyframes lload{0%{width:0}60%{width:80%}100%{width:100%}}
.cd-loader .ltxt{margin-top:16px;font-family:'Marcellus',serif;font-size:.65rem;letter-spacing:.4em;color:var(--gold);opacity:.7}
.cd .bubble{position:fixed;border-radius:50%;pointer-events:none;z-index:1;opacity:0}
.cd .bubble{background:radial-gradient(circle at 30% 30%,rgba(244,169,184,.25),rgba(200,77,99,.08));border:1px solid rgba(244,169,184,.12);animation:brise linear forwards}
@keyframes brise{0%{opacity:0;transform:translateY(0) scale(.3)}10%{opacity:.6}80%{opacity:.3}100%{opacity:0;transform:translateY(-100vh) scale(1)}}
.cd .mixer-sec{position:relative;min-height:100vh;overflow:hidden;background:radial-gradient(ellipse at 50% 80%,#1a1018,#0a0708 60%);display:flex;align-items:center;justify-content:center}
.cd .mixer-sec .wrap{text-align:center;max-width:800px}
.cd .glass-area{position:relative;width:200px;height:320px;margin:40px auto 0}
.cd .glass-svg{width:100%;height:100%}
.cd .glass-body{fill:none;stroke:rgba(255,255,255,.25);stroke-width:1.5}
.cd .glass-liquid{transition:all .6s cubic-bezier(.16,1,.3,1)}
.cd .ingred-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;margin-top:30px}
.cd .ibtn{background:rgba(255,255,255,.05);border:1px solid var(--line);color:var(--ink);padding:10px 18px;border-radius:100px;cursor:pointer;font-family:'Heebo',sans-serif;font-size:.85rem;transition:all .4s var(--ease);position:relative;overflow:hidden}
.cd .ibtn:hover{border-color:var(--gold);color:var(--gold)}
.cd .ibtn.added{background:rgba(217,179,130,.15);border-color:var(--gold);color:var(--gold);pointer-events:none}
.cd .ibtn.added::after{content:'\2713';margin-right:8px}
.cd .shake-btn{display:none;margin:24px auto 0;background:var(--gold);color:#1a0f12;border:none;padding:14px 32px;border-radius:100px;font-family:'Marcellus',serif;font-size:1rem;letter-spacing:.12em;cursor:pointer;animation:shakepulse 1.5s ease-in-out infinite}
.cd .shake-btn.show{display:block}
@keyframes shakepulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06);box-shadow:0 12px 30px -8px rgba(217,179,130,.5)}}
.cd .glass-area.shaking{animation:shakeGlass .4s ease-in-out 3}
@keyframes shakeGlass{0%,100%{transform:rotate(0)}25%{transform:rotate(-12deg)}75%{transform:rotate(12deg)}}
.cd .result-card{display:none;margin-top:30px;padding:28px;border:1px solid var(--line);border-radius:14px;background:var(--glass);backdrop-filter:blur(10px);text-align:center}
.cd .result-card.show{display:block;animation:up 1s var(--ease)}
.cd .result-card h3{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:600;color:var(--gold-l)}
.cd .result-card p{color:var(--muted);margin-top:8px}
.cd .pour-fx{position:absolute;width:4px;left:50%;top:-10px;background:linear-gradient(to bottom,var(--gold),transparent);border-radius:2px;transform-origin:top;opacity:0;transition:all .5s}
.cd .pour-fx.go{height:60px;opacity:.8;animation:pourDrip .6s ease-in forwards}
@keyframes pourDrip{0%{height:0;opacity:0}50%{height:60px;opacity:.8}100%{height:0;opacity:0;top:60px}}
</style>
