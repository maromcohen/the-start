<script>
(function(){
var c=window._cd;if(!c)return;
var ab=document.createElement('button');
ab.className='a11y-btn';ab.setAttribute('aria-label','תפריט נגישות');ab.innerHTML='♿';
c.appendChild(ab);
var ap=document.createElement('div');ap.className='a11y-panel';
ap.innerHTML='<h3>♿ נגישות</h3>'
+'<div class="a11y-opt" data-a="large"><div class="a11y-ic">א+</div><span>הגדלת טקסט</span></div>'
+'<div class="a11y-opt" data-a="contrast"><div class="a11y-ic">◐</div><span>ניגודיות גבוהה</span></div>'
+'<div class="a11y-opt" data-a="gray"><div class="a11y-ic">◑</div><span>גווני אפור</span></div>'
+'<div class="a11y-opt" data-a="links"><div class="a11y-ic">🔗</div><span>הדגשת קישורים</span></div>'
+'<div class="a11y-opt" data-a="noanim"><div class="a11y-ic">⏸</div><span>עצירת אנימציות</span></div>'
+'<div class="a11y-opt" data-a="cursor"><div class="a11y-ic">➤</div><span>סמן מוגדל</span></div>'
+'<div class="a11y-opt" data-a="readable"><div class="a11y-ic">Aa</div><span>פונט קריא</span></div>'
+'<button class="a11y-reset">איפוס הגדרות</button>';
c.appendChild(ap);
ab.addEventListener('click',function(ev){ev.stopPropagation();ap.classList.toggle('open');});
ap.addEventListener('click',function(ev){
var o=ev.target.closest('.a11y-opt');
if(o){o.classList.toggle('active');c.classList.toggle('a11y-'+o.dataset.a);return;}
if(ev.target.closest('.a11y-reset')){
ap.querySelectorAll('.a11y-opt').forEach(function(x){x.classList.remove('active');});
c.className=c.className.replace(/\ba11y-\w+/g,'').trim();
}
});
document.addEventListener('click',function(ev){if(!ap.contains(ev.target)&&ev.target!==ab)ap.classList.remove('open');});

function mkM(id,ttl,html){
var ov=document.createElement('div');ov.className='legal-overlay';ov.id=id;
ov.innerHTML='<div class="legal-modal"><button class="lclose">✕</button><h2>'+ttl+'</h2>'+html+'</div>';
c.appendChild(ov);
ov.querySelector('.lclose').addEventListener('click',function(){ov.classList.remove('open');});
ov.addEventListener('click',function(ev){if(ev.target===ov)ov.classList.remove('open');});
}

var TH='<h4>1. כללי</h4>'
+'<p>ברוכים הבאים לאתר Cocktails & Dreams (להלן "האתר"). האתר מופעל על ידי קוקטיילס אנד דרימס — שירותי בר נייד לאירועים (להלן "החברה"). השימוש באתר מהווה הסכמה לתנאים המפורטים להלן.</p>'
+'<h4>2. השירותים</h4>'
+'<p>החברה מספקת שירותי בר נייד, ברמנים מקצועיים, קוקטיילים ומשקאות לאירועים פרטיים ועסקיים. התמונות והתכנים באתר מוצגים להמחשה בלבד ועשויים להשתנות.</p>'
+'<h4>3. הזמנות וביטולים</h4>'
+'<p>הזמנת שירות מותנית באישור החברה. ביטול הזמנה עד 14 יום לפני האירוע — ללא חיוב. ביטול בין 14 ל-7 ימים — חיוב של 50%. ביטול פחות מ-7 ימים — חיוב מלא. תנאים אלה כפופים לחוק הגנת הצרכן.</p>'
+'<h4>4. גיל מינימלי</h4>'
+'<p>השירותים כוללים הגשת משקאות אלכוהוליים. בהתאם לחוק, הגשת אלכוהול מותרת מגיל 18 בלבד. החברה שומרת לעצמה את הזכות לבקש תעודה מזהה.</p>'
+'<h4>5. קניין רוחני</h4>'
+'<p>כל התכנים באתר, לרבות תמונות, סרטונים, עיצוב וטקסטים, הם רכושה הבלעדי של החברה. אין להעתיק, להפיץ או לעשות שימוש מסחרי ללא אישור בכתב.</p>'
+'<h4>6. הגבלת אחריות</h4>'
+'<p>החברה אינה אחראית לנזק עקיף, תוצאתי או מיוחד הנובע משימוש באתר. המידע באתר ניתן "כפי שהוא" (AS IS) ואינו מהווה התחייבות.</p>'
+'<h4>7. דין חל וסמכות שיפוט</h4>'
+'<p>על תקנון זה יחולו דיני מדינת ישראל. סמכות השיפוט הבלעדית תהיה לבתי המשפט במחוז תל אביב-יפו.</p>'
+'<p class="lupdate">עודכן לאחרונה: יוני 2026</p>';

var PH='<h4>מידע שאנו אוספים</h4>'
+'<p>בעת שימוש באתר ובטופס ההזמנה, אנו עשויים לאסוף את המידע הבא: שם מלא, מספר טלפון, סוג האירוע, מספר אורחים, ופרטים נוספים שתבחרו לשתף.</p>'
+'<h4>מטרות השימוש במידע</h4>'
+'<ul><li>יצירת קשר וטיפול בפניות והזמנות</li>'
+'<li>שיפור השירות והתאמתו לצרכי הלקוחות</li>'
+'<li>שליחת עדכונים ומבצעים (בכפוף להסכמתכם)</li></ul>'
+'<h4>שיתוף מידע עם צדדים שלישיים</h4>'
+'<p>איננו מוכרים, משכירים או מעבירים מידע אישי לצדדים שלישיים, למעט במקרים הבאים: דרישה חוקית, הגנה על זכויות החברה, או ספקי שירות הפועלים מטעמנו (כגון אחסון אתר).</p>'
+'<h4>עוגיות (Cookies)</h4>'
+'<p>האתר עשוי להשתמש בעוגיות לצורך תפעול תקין, שיפור חוויית המשתמש וניתוח סטטיסטי. ניתן לנהל את העדפות העוגיות דרך הגדרות הדפדפן.</p>'
+'<h4>אבטחת מידע</h4>'
+'<p>אנו נוקטים באמצעי אבטחה סבירים להגנה על המידע האישי. עם זאת, אין באפשרותנו להבטיח אבטחה מוחלטת בסביבת אינטרנט.</p>'
+'<h4>זכויות המשתמש</h4>'
+'<p>בהתאם לחוק הגנת הפרטיות, תשמ"א-1981, עומדת לכם הזכות לעיין במידע השמור אודותיכם, לתקנו או לבקש את מחיקתו. לפנייה בנושא: <b>054-493-0095</b></p>'
+'<p class="lupdate">עודכן לאחרונה: יוני 2026</p>';

var AH='<h4>מחויבות לנגישות</h4>'
+'<p>Cocktails & Dreams מחויבת להנגשת האתר לאנשים עם מוגבלויות, בהתאם להוראות תקנות שוויון זכויות לאנשים עם מוגבלות (התאמות נגישות לשירות), התשע"ג-2013, ובהתאם להנחיות WCAG 2.1 ברמת AA.</p>'
+'<h4>אמצעי הנגישות באתר</h4>'
+'<ul><li>כפתור נגישות עם אפשרויות התאמה אישית</li>'
+'<li>הגדלת טקסט</li>'
+'<li>ניגודיות גבוהה וגווני אפור</li>'
+'<li>הדגשת קישורים</li>'
+'<li>עצירת אנימציות</li>'
+'<li>סמן מוגדל</li>'
+'<li>החלפה לפונט קריא</li></ul>'
+'<h4>פנייה בנושא נגישות</h4>'
+'<p>אם נתקלתם בבעיית נגישות באתר, נשמח לסייע. ניתן לפנות אלינו:</p>'
+'<ul><li><b>רכז נגישות:</b> עידן הרמן</li>'
+'<li><b>טלפון:</b> 054-493-0095</li>'
+'<li><b>וואטסאפ:</b> <a href="https://wa.me/972544930095" style="color:var(--gold)">לחצו כאן</a></li></ul>'
+'<p>אנו מתחייבים לטפל בכל פנייה בנושא נגישות תוך 7 ימי עסקים.</p>'
+'<p class="lupdate">הצהרה זו עודכנה לאחרונה: יוני 2026</p>';

mkM('terms-modal','תקנון האתר',TH);
mkM('privacy-modal','מדיניות פרטיות',PH);
mkM('a11y-modal','הצהרת נגישות',AH);

var fn=c.querySelector('.fnav');
if(fn){
[{t:'תקנון',m:'terms-modal'},{t:'פרטיות',m:'privacy-modal'},{t:'נגישות',m:'a11y-modal'}].forEach(function(l){
var a=document.createElement('a');a.href='#';a.textContent=l.t;
a.addEventListener('click',function(ev){ev.preventDefault();document.getElementById(l.m).classList.add('open');});
fn.appendChild(a);
});
}
document.addEventListener('keydown',function(ev){
if(ev.key==='Escape'){c.querySelectorAll('.legal-overlay.open').forEach(function(o){o.classList.remove('open');});}
});
})();
</script>
