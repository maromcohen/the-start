<script>
(function(){
var c=window._cd;if(!c)return;
var ab=document.createElement('button');
ab.className='a11y-btn';ab.setAttribute('aria-label','תפריט נגישות');ab.innerHTML='♿';
c.appendChild(ab);
var ap=document.createElement('div');ap.className='a11y-panel';
ap.innerHTML='<h3>♿ נגישות</h3>'
+'<div class="a11y-opt" data-a="large"><div class="a11y-ic">א+</div><span>הגדלת טקסט</span></div>'
+'<div class="a11y-opt" data-a="contrast"><div class="a11y-ic">◐</div><span>ניגודיות גבוהה</span></div>'
+'<div class="a11y-opt" data-a="gray"><div class="a11y-ic">◑</div><span>גווני אפור</span></div>'
+'<div class="a11y-opt" data-a="links"><div class="a11y-ic">🔗</div><span>הדגשת קישורים</span></div>'
+'<div class="a11y-opt" data-a="noanim"><div class="a11y-ic">⏸</div><span>עצירת אנימציות</span></div>'
+'<div class="a11y-opt" data-a="cursor"><div class="a11y-ic">➤</div><span>סמן מוגדל</span></div>'
+'<div class="a11y-opt" data-a="readable"><div class="a11y-ic">Aa</div><span>פונט קריא</span></div>'
+'<button class="a11y-reset">איפוס הגדרות</button>';
c.appendChild(ap);
ab.addEventListener('click',function(ev){ev.stopPropagation();ap.classList.toggle('open');});
ap.addEventListener('click',function(ev){
var o=ev.target.closest('.a11y-opt');
if(o){o.classList.toggle('active');c.classList.toggle('a11y-'+o.dataset.a);return;}
if(ev.target.closest('.a11y-reset')){
ap.querySelectorAll('.a11y-opt').forEach(function(x){x.classList.remove('active');});
c.className=c.className.replace(/\ba11y-\w+/g,'').trim();
}
});
document.addEventListener('click',function(ev){if(!ap.contains(ev.target)&&ev.target!==ab)ap.classList.remove('open');});

function mkM(id,ttl,html){
var ov=document.createElement('div');ov.className='legal-overlay';ov.id=id;
ov.innerHTML='<div class="legal-modal"><button class="lclose">✕</button><h2>'+ttl+'</h2>'+html+'</div>';
c.appendChild(ov);
ov.querySelector('.lclose').addEventListener('click',function(){ov.classList.remove('open');});
ov.addEventListener('click',function(ev){if(ev.target===ov)ov.classList.remove('open');});
}

var AH='<h4>מחויבות לנגישות</h4>'
+'<p>Cocktails & Dreams מחויבת להנגשת האתר לאנשים עם מוגבלויות, בהתאם להוראות תקנות שוויון זכויות לאנשים עם מוגבלות (התאמות נגישות לשירות), התשע"ג-2013, ובהתאם להנחיות WCAG 2.1 ברמת AA.</p>'
+'<h4>אמצעי הנגישות באתר</h4>'
+'<ul><li>כפתור נגישות עם אפשרויות התאמה אישית</li>'
+'<li>הגדלת טקסט</li>'
+'<li>ניגודיות גבוהה וגווני אפור</li>'
+'<li>הדגשת קישורים</li>'
+'<li>עצירת אנימציות</li>'
+'<li>סמן מוגדל</li>'
+'<li>החלפה לפונט קריא</li></ul>'
+'<h4>פנייה בנושא נגישות</h4>'
+'<p>אם נתקלתם בבעיית נגישות באתר, נשמח לסייע. ניתן לפנות אלינו:</p>'
+'<ul><li><b>רכז נגישות:</b> עידן הרמן</li>'
+'<li><b>טלפון:</b> 054-493-0095</li>'
+'<li><b>וואטסאפ:</b> <a href="https://wa.me/972544930095" style="color:var(--gold)">לחצו כאן</a></li></ul>'
+'<p>אנו מתחייבים לטפל בכל פנייה בנושא נגישות תוך 7 ימי עסקים.</p>'
+'<p class="lupdate">הצהרה זו עודכנה לאחרונה: יוני 2026</p>';

mkM('a11y-modal','הצהרת נגישות',AH);

var fn=c.querySelector('.fnav');
if(fn){
var a=document.createElement('a');a.href='#';a.textContent='נגישות';
a.addEventListener('click',function(ev){ev.preventDefault();document.getElementById('a11y-modal').classList.add('open');});
fn.appendChild(a);
}
document.addEventListener('keydown',function(ev){
if(ev.key==='Escape'){c.querySelectorAll('.legal-overlay.open').forEach(function(o){o.classList.remove('open');});}
});
})();
</script>
