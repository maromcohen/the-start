[build]
  base = "websites/cocktails-and-dreams"
  command = "node build.js"
  publish = "public"

[context.deploy-preview]
  command = "node build.js"

[context.branch-deploy]
  command = "node build.js"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://*.wixstatic.com https://static.wixstatic.com blob:; media-src 'self' https://*.wixstatic.com https://video.wixstatic.com https://*.cloudfront.net; connect-src 'self' https://*.netlify.com https://*.netlify.app; frame-src 'self' https://identity.netlify.com"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200
